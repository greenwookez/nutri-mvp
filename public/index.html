<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nutri MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="topbar-title">
            <h1>Nutrition Today</h1>
          </div>
          <div class="date-nav" aria-label="Quick date picker">
            <button type="button" class="day-pill" id="prevDay">←</button>
            <input type="date" id="date" required aria-label="Date" />
            <button type="button" class="day-pill" id="nextDay">→</button>
          </div>
        </div>
      </header>

      <main class="container">
        <nav class="tabs" aria-label="Views">
          <button class="tab active" data-view="today">Today</button>
          <button class="tab" data-view="week">Week</button>
          <button class="tab" data-view="month">Month</button>
          <button type="button" class="btn btn-primary add-meal-btn" id="openAddMealModal">+ Add meal</button>
        </nav>

        <section id="today" class="view active">
          <article class="card kpi-hero" id="daySummary"></article>

          <article class="card">
            <div class="card-head">
              <h2>Today entries</h2>
            </div>
            <div id="todayEntries"></div>
          </article>
        </section>

        <section id="week" class="view">
          <article class="card">
            <div class="card-head">
              <h2>Weekly balance</h2>
            </div>
            <div id="weekSummary"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h2>By day</h2>
            </div>
            <div id="weekDays"></div>
          </article>
        </section>

        <section id="month" class="view">
          <article class="card">
            <div class="card-head">
              <h2>Monthly summary</h2>
            </div>
            <div id="monthSummary"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h2>Month days</h2>
            </div>
            <div id="monthDays"></div>
          </article>
        </section>
      </main>
    </div>

    <dialog id="addMealModal" class="modal-root" aria-labelledby="addMealTitle">
      <form id="mealForm" class="modal-card" method="dialog">
        <div class="modal-head">
          <div>
            <p class="modal-label">Manual log</p>
            <h2 id="addMealTitle">Add meal entry</h2>
          </div>
          <button type="button" id="closeAddMealModal" class="btn btn-ghost modal-close" aria-label="Close dialog">✕</button>
        </div>

        <div class="grid-form">
          <label class="field-group">
            <span>Date</span>
            <input type="date" id="mealDate" required />
          </label>
          <label class="field-group">
            <span>Time</span>
            <input type="time" id="mealTime" required />
          </label>
          <label class="field-group">
            <span>Meal type</span>
            <select id="mealType" required>
              <option value="" selected disabled>Select meal type</option>
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
              <option value="snack">Snack</option>
              <option value="other">Other</option>
            </select>
          </label>
          <label class="field-group field-span-2">
            <span>Food name</span>
            <input type="text" id="foodName" placeholder="Food name" required />
          </label>
          <label class="field-group">
            <span>Calories</span>
            <input type="number" id="calories" placeholder="Calories" min="0" required />
          </label>
          <label class="field-group">
            <span>Protein (g)</span>
            <input type="number" id="protein" placeholder="Protein" min="0" step="0.1" />
          </label>
          <label class="field-group">
            <span>Fat (g)</span>
            <input type="number" id="fat" placeholder="Fat" min="0" step="0.1" />
          </label>
          <label class="field-group">
            <span>Carbs (g)</span>
            <input type="number" id="carbs" placeholder="Carbs" min="0" step="0.1" />
          </label>
          <label class="field-group field-span-2">
            <span>Notes (optional)</span>
            <input type="text" id="notes" placeholder="Any note" />
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelAddMealModal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
