<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutri MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="topbar-title">
            <p class="eyebrow">Nutri MVP</p>
            <h1>Nutrition Today</h1>
          </div>
          <div class="date-nav" aria-label="Quick date picker">
            <button type="button" class="day-pill" id="prevDay">←</button>
            <input type="date" id="date" required aria-label="Date" />
            <button type="button" class="day-pill" id="nextDay">→</button>
            <label class="time-field" for="time">
              <span>Time</span>
              <input type="time" id="time" required />
            </label>
          </div>
        </div>
      </header>

      <main class="container">
        <nav class="tabs" aria-label="Views">
          <button class="tab active" data-view="today">Today</button>
          <button class="tab" data-view="week">Week</button>
          <button class="tab" data-view="month">Month</button>
          <button type="button" class="btn btn-primary add-meal-btn" id="scrollToAdd">+ Add meal</button>
        </nav>

        <section id="today" class="view active">
          <article class="card kpi-hero" id="daySummary"></article>

          <div class="today-grid">
            <article class="card" id="addMealCard">
              <div class="card-head">
                <h2>Add meal entry</h2>
                <p>Fast manual logging with full control.</p>
              </div>
              <form id="mealForm" class="grid-form">
                <select id="mealType">
                  <option value="breakfast">Breakfast</option>
                  <option value="lunch">Lunch</option>
                  <option value="dinner">Dinner</option>
                  <option value="snack">Snack</option>
                  <option value="other">Other</option>
                </select>
                <input type="text" id="foodName" placeholder="Food name" required />
                <input type="number" id="calories" placeholder="Calories" min="0" required />
                <input type="number" id="protein" placeholder="Protein (g)" min="0" step="0.1" />
                <input type="number" id="fat" placeholder="Fat (g)" min="0" step="0.1" />
                <input type="number" id="carbs" placeholder="Carbs (g)" min="0" step="0.1" />
                <input type="text" id="notes" placeholder="Note (optional)" />
                <button type="submit" class="btn btn-primary">Save</button>
              </form>
            </article>
          </div>

          <article class="card">
            <div class="card-head">
              <h2>Today entries</h2>
            </div>
            <div id="todayEntries"></div>
          </article>
        </section>

        <section id="week" class="view">
          <article class="card">
            <div class="card-head">
              <h2>Weekly balance</h2>
            </div>
            <div id="weekSummary"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h2>By day</h2>
            </div>
            <div id="weekDays"></div>
          </article>
        </section>

        <section id="month" class="view">
          <article class="card">
            <div class="card-head">
              <h2>Monthly summary</h2>
            </div>
            <div id="monthSummary"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h2>Month days</h2>
            </div>
            <div id="monthDays"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
